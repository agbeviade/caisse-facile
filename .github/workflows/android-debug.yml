name: Android Debug APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/android-debug.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Bootstrap Flutter platforms (idempotent)
        run: flutter create --platforms=android --org com.caissefacile .

      - name: Set Android minSdk to 21
        run: |
          if [ -f android/app/build.gradle ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle || true
          fi

      - name: Pub get
        run: flutter pub get

      - name: Generate native splash
        run: dart run flutter_native_splash:create

      - name: Analyze (non-fatal)
        run: flutter analyze --no-fatal-infos || true

      - name: Build debug APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build apk --debug \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: caisse-facile-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
