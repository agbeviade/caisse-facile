workflows:
  android-debug:
    name: Android Debug APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      vars:
        PACKAGE_NAME: "com.caissefacile.app"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
    scripts:
      - name: Bootstrap Flutter platforms
        script: |
          # Idempotent: génère / complète android/ios (MainActivity, build.gradle, etc.)
          flutter create --platforms=android,ios --org com.caissefacile .
      - name: Inject Supabase env into Dart defines
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" >> $CM_ENV
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> $CM_ENV
      - name: Set Android minSdk to 21
        script: |
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle || true
      - name: Pub get
        script: flutter pub get
      - name: Generate native splash
        script: dart run flutter_native_splash:create
      - name: Analyze
        script: flutter analyze --no-fatal-infos || true
      - name: Build Debug APK
        script: |
          flutter build apk --debug \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt

  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      groups:
        - keystore_credentials   # Codemagic UI: ANDROID_KEYSTORE, *_PASSWORD, *_ALIAS
        - supabase
      vars:
        PACKAGE_NAME: "com.caissefacile.app"
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true
    scripts:
      - name: Bootstrap Flutter platforms
        script: |
          flutter create --platforms=android,ios --org com.caissefacile .
      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=/tmp/keystore.jks
          EOF
      - name: Pub get
        script: flutter pub get
      - name: Generate native splash
        script: dart run flutter_native_splash:create
      - name: Build release APK
        script: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
      - name: Build release AAB
        script: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
